<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Reel Maker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=JetBrains+Mono:wght@400;700&family=Inter+Tight:wght@400;600;800&display=swap" rel="stylesheet">

<!--
  NO FFmpeg. No SharedArrayBuffer. No service workers.
  Export uses MediaRecorder + canvas.captureStream() — native Chrome API.
  Output: .webm (VP9). Instagram, YouTube Shorts, TikTok all accept .webm.
-->
<style>
:root {
  --ink: #0e0e0e;
  --paper: #f7f4ef;
  --accent: #c0392b;
  --muted: #888;
  --border: #ddd;
  --radius: 6px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter Tight', sans-serif;
  --serif: 'Fraunces', Georgia, serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); background:var(--paper); color:var(--ink); min-height:100vh; padding:32px 20px 60px; }
.shell { max-width:960px; margin:0 auto; }

.header { display:flex; align-items:baseline; gap:16px; margin-bottom:40px; border-bottom:2px solid var(--ink); padding-bottom:20px; }
.header h1 { font-family:var(--serif); font-size:32px; font-weight:800; letter-spacing:-0.5px; }
.header .tag { font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

.banner { display:none; background:#fff8e1; border:1px solid #f0c040; border-radius:var(--radius); padding:12px 16px; font-size:13px; color:#7a5c00; margin-bottom:24px; }
.banner.show { display:block; }

.grid { display:grid; grid-template-columns:1fr 420px; gap:32px; align-items:start; }
@media(max-width:800px){ .grid{ grid-template-columns:1fr; } }

.panel-label { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px; }

.json-wrap { margin-bottom:20px; }
textarea { width:100%; height:220px; padding:14px; font-family:var(--mono); font-size:12px; line-height:1.6; border:1.5px solid var(--border); border-radius:var(--radius); resize:vertical; background:white; color:var(--ink); transition:border-color 0.15s; }
textarea:focus { outline:none; border-color:var(--ink); }
textarea.has-error { border-color:var(--accent); background:#fff5f5; }
.field-error { display:none; font-size:12px; color:var(--accent); margin-top:6px; font-family:var(--mono); }
.field-error.show { display:block; }

.presets { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.preset-btn { padding:10px 14px; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border:1.5px solid var(--border); border-radius:var(--radius); background:white; cursor:pointer; transition:all 0.15s; text-align:left; color:var(--ink); }
.preset-btn:hover { border-color:var(--ink); }
.preset-btn.active { border-color:var(--ink); background:var(--ink); color:white; }
.preset-btn .pname { font-weight:700; display:block; margin-bottom:2px; }
.preset-btn .pdesc { font-size:10px; opacity:0.6; }

.themes { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
.theme-swatch { width:36px; height:36px; border-radius:50%; border:2.5px solid transparent; cursor:pointer; transition:all 0.15s; }
.theme-swatch.active { border-color:var(--ink); transform:scale(1.15); box-shadow:0 0 0 2px white, 0 0 0 4px var(--ink); }

.slider-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.slider-row label { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); white-space:nowrap; }
input[type=range] { flex:1; accent-color:var(--ink); }
.slider-val { font-family:var(--mono); font-size:12px; min-width:36px; text-align:right; }

.actions { display:flex; gap:10px; margin-bottom:12px; }
.btn { padding:12px 20px; font-family:var(--mono); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; border:none; border-radius:var(--radius); cursor:pointer; transition:all 0.15s; }
.btn-primary { background:var(--ink); color:white; flex:1; }
.btn-primary:hover:not(:disabled) { background:#333; }
.btn-primary:disabled { background:#ccc; cursor:not-allowed; color:#999; }
.btn-ghost { background:white; color:var(--ink); border:1.5px solid var(--border); }
.btn-ghost:hover:not(:disabled) { border-color:var(--ink); }
.btn-ghost:disabled { opacity:0.4; cursor:not-allowed; }
.btn-record { background:#c0392b; color:white; flex:1; }
.btn-record:hover:not(:disabled) { background:#a93226; }
.btn-record:disabled { background:#ccc; cursor:not-allowed; color:#999; }

.recording-status { display:none; background:#fdedec; border:1px solid #e74c3c; border-radius:var(--radius); padding:12px 16px; margin-bottom:12px; font-family:var(--mono); font-size:12px; color:#922b21; }
.recording-status.show { display:flex; align-items:center; gap:10px; }
.rec-dot { width:10px; height:10px; border-radius:50%; background:#e74c3c; animation:blink 1s infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.status { display:none; padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px; }
.status.show { display:block; }
.status.info { background:#e8f0fe; color:#1a4090; border:1px solid #aac4f7; }
.status.success { background:#e6f9f0; color:#145a32; border:1px solid #7dcea0; }
.status.error { background:#fdeded; color:#7b1c1c; border:1px solid #f1a7a7; }

.debug-wrap { margin-top:16px; }
.debug-toggle { font-family:var(--mono); font-size:11px; color:var(--muted); cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; }
.debug-console { display:none; margin-top:8px; background:#1a1a1a; color:#ccc; border-radius:var(--radius); padding:12px; font-family:var(--mono); font-size:11px; line-height:1.7; max-height:200px; overflow-y:auto; }
.debug-console.open { display:block; }
.log-ok { color:#5dbb6a; } .log-err { color:#f07070; } .log-warn { color:#f0c060; } .log-info { color:#8ec8f7; }

.preview-panel { position:sticky; top:24px; }
.preview-frame { background:#e8e4dc; border-radius:12px; padding:16px; box-shadow:0 8px 32px rgba(0,0,0,0.12); }
.preview-screen { width:100%; aspect-ratio:4/5; border-radius:8px; overflow:hidden; position:relative; background:#faf8f4; }
#previewCanvas { width:100%; height:100%; display:block; border-radius:8px; }
.preview-controls { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
.slide-dots { display:flex; gap:4px; }
.dot { width:6px; height:6px; border-radius:50%; background:#bbb; transition:background 0.2s; }
.dot.active { background:var(--ink); }
.slide-num { font-family:var(--mono); font-size:11px; color:var(--muted); }

/* Encode canvas: off-screen but NOT display:none — captureStream needs it in render tree */
#encodeCanvas { position:fixed; left:-9999px; top:0; width:1080px; height:1350px; }
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <h1>Kinetic Reel Maker</h1>
    <span class="tag">Chrome on Desktop &bull; Exports 1080&times;1350 WebM</span>
  </header>

  <div class="banner" id="warningBanner"></div>

  <div class="grid">
    <!-- LEFT -->
    <div>
      <div class="json-wrap">
        <div class="panel-label">1 — Paste carousel JSON</div>
        <textarea id="jsonInput" spellcheck="false" placeholder='{"theme":"cream","brand":"Career Roads","slides":[{"type":"hook","eyebrow":"real story","title":"₹18 LPA\nFRESHER\nNO MBA","subtitle":"No degree. Just 15 exams.","body":"The offer was real.\nThe person was 24.","cta":"swipe to find out"}]}'></textarea>
        <div class="field-error" id="jsonError"></div>
      </div>

      <div class="panel-label">2 — Animation preset</div>
      <div class="presets" id="presetPicker">
        <button class="preset-btn active" data-preset="slam">
          <span class="pname">Slam</span><span class="pdesc">Words crash in hard</span>
        </button>
        <button class="preset-btn" data-preset="drift">
          <span class="pname">Drift</span><span class="pdesc">Smooth upward float</span>
        </button>
        <button class="preset-btn" data-preset="typewriter">
          <span class="pname">Typewriter</span><span class="pdesc">Characters reveal one by one</span>
        </button>
        <button class="preset-btn" data-preset="bounce">
          <span class="pname">Bounce</span><span class="pdesc">Elastic spring entry</span>
        </button>
      </div>

      <div class="panel-label">3 — Theme</div>
      <div class="themes" id="themePicker">
        <div class="theme-swatch active" data-theme="cream"
          title="Cream" style="background:linear-gradient(135deg,#faf8f4 50%,#b14e2f 50%)"></div>
        <div class="theme-swatch" data-theme="dark-minimal"
          title="Dark" style="background:linear-gradient(135deg,#0f0f0f 50%,#f5f5f5 50%)"></div>
        <div class="theme-swatch" data-theme="dark-purple"
          title="Purple" style="background:linear-gradient(135deg,#1a0a2e 50%,#9b6dff 50%)"></div>
        <div class="theme-swatch" data-theme="dark-magenta"
          title="Magenta" style="background:linear-gradient(135deg,#1a0a14 50%,#d44d8a 50%)"></div>
      </div>

      <div class="slider-row">
        <label>Slide duration</label>
        <input type="range" id="durSlider" min="2" max="6" step="0.5" value="3">
        <span class="slider-val" id="durVal">3s</span>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="previewBtn" disabled>▶ Preview</button>
        <button class="btn btn-ghost"   id="stopBtn"    disabled>■ Stop</button>
      </div>
      <div class="actions">
        <button class="btn btn-record" id="exportBtn" disabled>⬤ Record Video</button>
      </div>

      <div class="recording-status" id="recStatus">
        <div class="rec-dot"></div>
        <span id="recLabel">Recording slide 1 / 7…</span>
      </div>

      <div class="status" id="statusMsg"></div>

      <div class="debug-wrap">
        <button class="debug-toggle" id="debugToggle">Show debug console</button>
        <div class="debug-console" id="debugConsole"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="preview-panel">
      <div class="preview-frame">
        <div class="preview-screen">
          <canvas id="previewCanvas" width="540" height="675"></canvas>
        </div>
        <div class="preview-controls">
          <div class="slide-dots" id="slideDots"></div>
          <div class="slide-num"  id="slideNum">— / —</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Off-screen full-res canvas for recording — NOT display:none -->
<canvas id="encodeCanvas" width="1080" height="1350"></canvas>

<script>
'use strict';

// ── THEMES ──────────────────────────────────────────────────────
const THEMES = {
  'cream':        { bg:'#faf8f4', text:'#1a1a1a', eyebrow:'#b14e2f', accent:'#b14e2f', brand:'#ccbfa8', cta:'#b14e2f' },
  'dark-minimal': { bg:'#0f0f0f', text:'#f5f5f5', eyebrow:'#777',    accent:'#f5f5f5', brand:'#333',    cta:'#f5f5f5' },
  'dark-purple':  { bg:'#1a0a2e', text:'#f0eaff', eyebrow:'#9b6dff', accent:'#9b6dff', brand:'#3d2060', cta:'#9b6dff' },
  'dark-magenta': { bg:'#1a0a14', text:'#ffe0f0', eyebrow:'#d44d8a', accent:'#d44d8a', brand:'#4a1530', cta:'#d44d8a' }
};

// ── LAYOUT (at 1080×1350) ────────────────────────────────────────
const L = {
  px:80, eyebrowY:170, titleStartY:270, titleLineH:118,
  subtitleGap:70, bodyGap:50, bodyLineH:52,
  ctaY:1240, brandX:1030, brandStartY:180, maxW:900
};

// ── EASING ───────────────────────────────────────────────────────
const ease = {
  outExpo:  t => t===1 ? 1 : 1-Math.pow(2,-10*t),
  outBounce:t => {
    const n=7.5625,d=2.75;
    if(t<1/d) return n*t*t;
    if(t<2/d) return n*(t-=1.5/d)*t+0.75;
    if(t<2.5/d) return n*(t-=2.25/d)*t+0.9375;
    return n*(t-=2.625/d)*t+0.984375;
  },
  inOutQuad:t => t<0.5 ? 2*t*t : -1+(4-2*t)*t
};

// ── PRESETS ──────────────────────────────────────────────────────
// Each returns { offsetY, scale, alpha, charReveal } for t in [0,1]
const PRESETS = {
  slam:       t => ({ offsetY:(1-ease.outExpo(t))*60,   scale:0.7+0.3*ease.outExpo(t),   alpha:Math.min(1,t*3),      charReveal:1 }),
  drift:      t => ({ offsetY:(1-ease.outExpo(t))*40,   scale:1,                          alpha:ease.outExpo(t),       charReveal:1 }),
  typewriter: t => ({ offsetY:0,                         scale:1,                          alpha:1,                     charReveal:t }),
  bounce:     t => ({ offsetY:(1-ease.outBounce(t))*50, scale:1,                          alpha:Math.min(1,t*2),       charReveal:1 })
};

// ── STATE ────────────────────────────────────────────────────────
let currentData  = null;
let activePreset = 'slam';
let activeTheme  = 'cream';
let slideDur     = 3;
let animRAF      = null;
let animRunning  = false;
let isRecording  = false;

// ── DOM ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const previewCanvas = $('previewCanvas');
const encodeCanvas  = $('encodeCanvas');
const pCtx = previewCanvas.getContext('2d');
const eCtx = encodeCanvas.getContext('2d');

// ── DEBUG LOGGER ─────────────────────────────────────────────────
const debugEl = $('debugConsole');
let debugOpen = false;
$('debugToggle').addEventListener('click', () => {
  debugOpen = !debugOpen;
  debugEl.classList.toggle('open', debugOpen);
  $('debugToggle').textContent = debugOpen ? 'Hide debug console' : 'Show debug console';
});
function log(msg, type='info') {
  const t = new Date().toLocaleTimeString('en-IN',{hour12:false});
  const d = document.createElement('div');
  d.className = 'log-'+type;
  d.textContent = `[${t}] ${msg}`;
  debugEl.appendChild(d);
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(`[kinetic:${type}]`, msg);
}

// ── UI HELPERS ───────────────────────────────────────────────────
function showStatus(msg, type='info') {
  const el = $('statusMsg');
  el.textContent = msg;
  el.className = `status show ${type}`;
}
function clearStatus() { $('statusMsg').className = 'status'; }

function setButtons(state) {
  const has = !!currentData;
  if (state === 'idle') {
    $('previewBtn').disabled = !has;
    $('exportBtn').disabled  = !has;
    $('stopBtn').disabled    = true;
  } else if (state === 'previewing') {
    $('previewBtn').disabled = true;
    $('exportBtn').disabled  = true;
    $('stopBtn').disabled    = false;
  } else if (state === 'recording') {
    $('previewBtn').disabled = true;
    $('exportBtn').disabled  = true;
    $('stopBtn').disabled    = true;
  }
}

function buildDots(n) {
  const el = $('slideDots');
  el.innerHTML = '';
  for (let i=0;i<n;i++) {
    const d = document.createElement('div');
    d.className='dot';
    el.appendChild(d);
  }
}
function setDot(i, n) {
  document.querySelectorAll('.dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
  $('slideNum').textContent = `${i+1} / ${n}`;
}

function showRecording(slideIdx, total) {
  $('recStatus').classList.add('show');
  $('recLabel').textContent = `Recording slide ${slideIdx+1} / ${total}…`;
}
function hideRecording() { $('recStatus').classList.remove('show'); }

// ── BROWSER CHECK ────────────────────────────────────────────────
(function() {
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  if (isSafari) {
    $('warningBanner').textContent = '⚠️ Safari does not support canvas recording. Use Chrome or Firefox on desktop.';
    $('warningBanner').classList.add('show');
    log('Safari detected — export will not work', 'warn');
  } else if (isMobile) {
    $('warningBanner').textContent = '⚠️ Mobile may struggle with 1080p recording. Preview works fine.';
    $('warningBanner').classList.add('show');
    log('Mobile detected', 'warn');
  }

  if (!window.MediaRecorder) {
    log('MediaRecorder API not found — export disabled', 'err');
    showStatus('This browser does not support video recording. Please use Chrome.', 'error');
  } else {
    // Check VP9 support
    const vp9 = MediaRecorder.isTypeSupported('video/webm;codecs=vp9');
    const vp8 = MediaRecorder.isTypeSupported('video/webm;codecs=vp8');
    const wb  = MediaRecorder.isTypeSupported('video/webm');
    log(`MediaRecorder ready. VP9:${vp9} VP8:${vp8} WebM:${wb}`, 'ok');
  }
})();

// ── FONT LOADING ─────────────────────────────────────────────────
async function waitFonts() {
  await document.fonts.ready;
  await Promise.all([
    document.fonts.load('800 96px "Fraunces"'),
    document.fonts.load('400 32px "Inter Tight"'),
    document.fonts.load('700 26px "JetBrains Mono"')
  ]);
  const ok = document.fonts.check('800 96px "Fraunces"');
  log(`Fonts ready. Fraunces loaded: ${ok}`, ok ? 'ok' : 'warn');
}

// ── JSON VALIDATION ──────────────────────────────────────────────
function parseSlides(raw) {
  const d = JSON.parse(raw);
  if (!Array.isArray(d.slides) || !d.slides.length) throw new Error('"slides" must be a non-empty array');
  if (!THEMES[d.theme]) throw new Error(`"theme" must be one of: ${Object.keys(THEMES).join(', ')}`);
  d.slides.forEach((s,i) => { if (!s.title) throw new Error(`slide[${i}] missing "title"`); });
  return d;
}

$('jsonInput').addEventListener('input', () => {
  const errEl = $('jsonError');
  errEl.className = 'field-error';
  $('jsonInput').classList.remove('has-error');
  const raw = $('jsonInput').value.trim();
  if (!raw) { currentData=null; setButtons('idle'); return; }
  try {
    currentData = parseSlides(raw);
    setActiveTheme(currentData.theme);
    buildDots(currentData.slides.length);
    setDot(0, currentData.slides.length);
    setButtons('idle');
    log(`Parsed OK: ${currentData.slides.length} slides, theme=${currentData.theme}`, 'ok');
  } catch(e) {
    currentData=null;
    errEl.textContent = e.message;
    errEl.className = 'field-error show';
    $('jsonInput').classList.add('has-error');
    setButtons('idle');
  }
});

// ── PRESET PICKER ────────────────────────────────────────────────
$('presetPicker').addEventListener('click', e => {
  const b = e.target.closest('.preset-btn');
  if (!b) return;
  document.querySelectorAll('.preset-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  activePreset = b.dataset.preset;
  log(`Preset: ${activePreset}`);
});

// ── THEME PICKER ─────────────────────────────────────────────────
function setActiveTheme(t) {
  if (!THEMES[t]) return;
  activeTheme = t;
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s.dataset.theme===t));
}
$('themePicker').addEventListener('click', e => {
  const s = e.target.closest('.theme-swatch');
  if (s) { setActiveTheme(s.dataset.theme); log(`Theme: ${activeTheme}`); }
});

// ── DURATION ─────────────────────────────────────────────────────
$('durSlider').addEventListener('input', () => {
  slideDur = parseFloat($('durSlider').value);
  $('durVal').textContent = slideDur + 's';
});

// ── CANVAS DRAWING ───────────────────────────────────────────────
function sc(canvas) { return canvas.width / 1080; }  // scale factor

function drawSlide(canvas, ctx, slide, themeKey, anim) {
  // anim: { offsetY, scale, alpha, charReveal } — pass null for static
  const s  = sc(canvas);
  const T  = THEMES[themeKey];
  const W  = canvas.width, H = canvas.height;
  const px = L.px * s;
  const { offsetY=0, scale=1, alpha=1, charReveal=1 } = anim || {};

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = T.bg;
  ctx.fillRect(0,0,W,H);

  // Left accent stripe
  ctx.fillStyle = T.accent;
  ctx.fillRect(0,0,6*s,H);

  ctx.save();
  ctx.globalAlpha = alpha;

  // Kinetic transform
  if (offsetY !== 0 || scale !== 1) {
    ctx.translate(0, offsetY*s);
    if (scale !== 1) {
      ctx.translate(W/2, H/2);
      ctx.scale(scale,scale);
      ctx.translate(-W/2,-H/2);
    }
  }

  let y = L.eyebrowY * s;

  // Eyebrow
  if (slide.eyebrow) {
    ctx.fillStyle = T.eyebrow;
    ctx.font = `500 ${28*s}px "JetBrains Mono",monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(slide.eyebrow.toUpperCase(), px, y);
  }

  // Title (multi-line, with charReveal for typewriter)
  y = L.titleStartY * s;
  if (slide.title) {
    ctx.fillStyle = T.text;
    ctx.font = `800 ${94*s}px "Fraunces",Georgia,serif`;
    ctx.textAlign = 'left';
    const lines = slide.title.split('\n');
    const totalChars = lines.join('').length;
    let charsShown = Math.ceil(totalChars * charReveal);
    lines.forEach(line => {
      const show = charReveal < 1
        ? (charsShown > 0 ? line.slice(0, charsShown) : '')
        : line;
      charsShown -= line.length;
      ctx.fillText(show, px, y, L.maxW*s);
      y += L.titleLineH*s;
    });
  }

  // Subtitle
  if (slide.subtitle) {
    y += (L.subtitleGap - L.titleLineH)*s;
    const prevA = ctx.globalAlpha;
    ctx.globalAlpha = alpha * 0.72;
    ctx.fillStyle = T.text;
    ctx.font = `400 ${35*s}px "Inter Tight",sans-serif`;
    ctx.fillText(slide.subtitle, px, y, L.maxW*s);
    ctx.globalAlpha = prevA;
    y += L.subtitleGap*s*0.8;
  }

  // Body
  if (slide.body) {
    y += L.bodyGap*s*0.3;
    const prevA = ctx.globalAlpha;
    ctx.globalAlpha = alpha * 0.62;
    ctx.fillStyle = T.text;
    ctx.font = `400 ${31*s}px "Inter Tight",sans-serif`;
    slide.body.split('\n').forEach(line => {
      ctx.fillText(line, px, y, L.maxW*s);
      y += L.bodyLineH*s;
    });
    ctx.globalAlpha = prevA;
  }

  // CTA
  if (slide.cta) {
    ctx.fillStyle = T.cta;
    ctx.font = `700 ${25*s}px "JetBrains Mono",monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(slide.cta.toUpperCase(), px, L.ctaY*s);
  }

  // Brand (vertical)
  const brand = currentData?.brand || '';
  if (brand) {
    ctx.fillStyle = T.brand;
    ctx.font = `400 ${21*s}px "JetBrains Mono",monospace`;
    ctx.textAlign = 'left';
    ctx.save();
    ctx.translate(L.brandX*s, L.brandStartY*s);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(brand.toUpperCase(), 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

// ── ANIMATION RUNNER ─────────────────────────────────────────────
// Shared by preview (previewCanvas, pCtx) and export (encodeCanvas, eCtx)
const ANIM_IN  = 600;   // ms
const ANIM_OUT = 300;   // ms

function stopAnim() {
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF=null; }
  animRunning = false;
}

// Runs animation on a given canvas, returns a Promise that resolves when done
// onSlideChange(slideIndex) called each time a new slide starts
async function runAnim(canvas, ctx, themeKey, onSlideChange) {
  const slides   = currentData.slides;
  const holdMs   = slideDur * 1000;
  const preset   = PRESETS[activePreset] || PRESETS.slam;

  function wait(ms) {
    return new Promise(res => {
      const start = performance.now();
      function tick() {
        if (!animRunning) { res(); return; }
        if (performance.now()-start >= ms) { res(); return; }
        animRAF = requestAnimationFrame(tick);
      }
      animRAF = requestAnimationFrame(tick);
    });
  }

  function animateIn() {
    return new Promise(res => {
      const start = performance.now();
      function tick() {
        if (!animRunning) { res(); return; }
        const t = Math.min(1, (performance.now()-start)/ANIM_IN);
        drawSlide(canvas, ctx, slides[si], themeKey, preset(t));
        if (t < 1) { animRAF = requestAnimationFrame(tick); } else { res(); }
      }
      animRAF = requestAnimationFrame(tick);
    });
  }

  function animateOut() {
    return new Promise(res => {
      const start = performance.now();
      function tick() {
        if (!animRunning) { res(); return; }
        const t = Math.min(1, (performance.now()-start)/ANIM_OUT);
        const a = 1 - ease.inOutQuad(t);
        ctx.globalAlpha = a;
        drawSlide(canvas, ctx, slides[si], themeKey, null);
        ctx.globalAlpha = 1;
        if (t < 1) { animRAF = requestAnimationFrame(tick); } else { res(); }
      }
      animRAF = requestAnimationFrame(tick);
    });
  }

  var si = 0;
  for (si=0; si<slides.length; si++) {
    if (!animRunning) break;
    if (onSlideChange) onSlideChange(si);
    await animateIn();
    await wait(holdMs);
    if (si < slides.length-1) await animateOut();
  }
}

// ── PREVIEW ──────────────────────────────────────────────────────
async function startPreview() {
  stopAnim();
  animRunning = true;
  setButtons('previewing');
  const themeKey = activeTheme || currentData.theme;
  log(`Preview: ${currentData.slides.length} slides, preset=${activePreset}, theme=${themeKey}`);

  try {
    await waitFonts();
    await runAnim(previewCanvas, pCtx, themeKey, (i) => {
      setDot(i, currentData.slides.length);
    });
  } catch(e) {
    log('Preview error: '+e.message, 'err');
    showStatus('Preview error: '+e.message, 'error');
  } finally {
    animRunning = false;
    setButtons('idle');
    log('Preview ended');
  }
}

$('previewBtn').addEventListener('click', () => { if (currentData) startPreview(); });
$('stopBtn').addEventListener('click', () => {
  stopAnim();
  setButtons('idle');
  hideRecording();
  log('Stopped by user');
});

// ── EXPORT (MediaRecorder) ────────────────────────────────────────
async function startExport() {
  if (!currentData || isRecording) return;

  // Check API support
  if (!window.MediaRecorder || !encodeCanvas.captureStream) {
    showStatus('Your browser does not support canvas recording. Use Chrome desktop.', 'error');
    return;
  }

  const themeKey = activeTheme || currentData.theme;
  const totalSlides = currentData.slides.length;
  const estSeconds  = Math.round(totalSlides * (slideDur + (ANIM_IN + ANIM_OUT) / 1000));

  log(`Export start. Slides:${totalSlides}, ~${estSeconds}s at ${slideDur}s/slide`);

  stopAnim();
  isRecording  = true;
  animRunning  = true;
  setButtons('recording');
  showRecording(0, totalSlides);
  clearStatus();

  await waitFonts();

  // Pick best supported MIME
  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm;codecs=vp8';
    log('VP9 not supported, falling back to VP8', 'warn');
  }
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm';
    log('VP8 not supported, falling back to plain webm', 'warn');
  }
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    showStatus('No supported video format found. Use Chrome desktop.', 'error');
    isRecording = false;
    animRunning = false;
    setButtons('idle');
    return;
  }
  log(`Using MIME: ${mimeType}`, 'ok');

  const chunks = [];
  const stream = encodeCanvas.captureStream(30);
  log(`captureStream(30fps) attached to encodeCanvas`);

  const recorder = new MediaRecorder(stream, {
    mimeType,
    videoBitsPerSecond: 8_000_000   // 8 Mbps — good quality at 1080p
  });

  recorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
    log(`Data chunk: ${(e.data.size/1024).toFixed(1)} KB`);
  };

  recorder.onerror = e => {
    log('Recorder error: ' + e.error?.message, 'err');
    showStatus('Recording error: ' + e.error?.message, 'error');
    isRecording = false;
    animRunning = false;
    setButtons('idle');
    hideRecording();
  };

  recorder.onstop = () => {
    log(`Recording stopped. ${chunks.length} chunks collected`, 'ok');
    const blob = new Blob(chunks, { type: mimeType });
    log(`Final file: ${(blob.size/1024/1024).toFixed(2)} MB`, 'ok');

    const slug = (currentData.brand || 'reel').toLowerCase().replace(/\s+/g,'-');
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${slug}-kinetic.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);

    hideRecording();
    showStatus(`✓ Saved ${(blob.size/1024/1024).toFixed(1)} MB — check your Downloads`, 'success');
    isRecording = false;
    setButtons('idle');
  };

  // Start recording, then run animation, then stop
  recorder.start(1000);  // collect chunks every 1s
  log('MediaRecorder started');

  try {
    await runAnim(encodeCanvas, eCtx, themeKey, (i) => {
      showRecording(i, totalSlides);
      log(`Recording slide ${i+1}/${totalSlides}`);
    });
  } catch(e) {
    log('Animation error during export: ' + e.message, 'err');
  }

  // Small pause to ensure last frame is flushed into the stream
  await new Promise(r => setTimeout(r, 500));

  recorder.stop();
  animRunning = false;
  log('Recorder.stop() called — waiting for onstop...');
}

$('exportBtn').addEventListener('click', startExport);

// ── INIT ─────────────────────────────────────────────────────────
(function init() {
  log('Kinetic Reel Maker ready');
  setButtons('idle');
  // Draw placeholder on preview canvas
  pCtx.fillStyle = '#ede9e2';
  pCtx.fillRect(0,0,540,675);
  pCtx.fillStyle = '#aaa';
  pCtx.font = '13px "JetBrains Mono",monospace';
  pCtx.textAlign = 'center';
  pCtx.fillText('Paste JSON above to begin', 270, 337);
})();
</script>
